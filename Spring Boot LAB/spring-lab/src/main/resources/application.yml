# ============================================
# SHARED CONFIGURATION (DEFAULT)
# ============================================
spring:
  profiles:
    active: dev

  application:
    name: spring-lab

  jpa:
    open-in-view: false

  # Jackson Configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-exception: false
    include-stacktrace: never

  tomcat:
    connection-timeout: 20000
    max-connections: 10000
    threads:
      max: 200
      min-spare: 10

# Logging
logging:
  level:
    com.rojudo.spring_lab: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%-5level) [%thread] %clr(%logger{36}){cyan} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/spring-lab.log
    max-size: 100MB
    max-history: 30

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: true
  use-fqn: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    info:
      enabled: true
    metrics:
      enabled: true
  info:
    env:
      enabled: true
      
# ============================================
# DEVELOPMENT PROFILE
# ============================================
---
spring:
  config:
    activate:
      on-profile: dev
  
  messages:
    basename: validation-messages
    encoding: UTF-8
    fallback-to-system-locale: false
  
  devtools:
    restart:
      enabled: true
      additional-paths:
        - src/main/resources
      exclude:
        - static/**
        - public/**
    livereload:
      enabled: true
  
  datasource:
    url: jdbc:postgresql://localhost:5432/springlab_db
    username: springlab_user
    password: springlab_password
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: SpringLabHikariPool

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 100
        cache:
          use_second_level_cache: false
          use_query_cache: false
        generate_statistics: true
        enable_lazy_load_no_trans: false

  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN,USER

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: flyway_schema_history
    validate-on-migrate: false

data:
  initializer:
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc: DEBUG

    # Desabilita logs de estatísticas
    org.hibernate.stat: DEBUG
    org.hibernate.engine.internal.StatisticalLoggingSessionEventListener: OFF

# ============================================
# PRODUCTION PROFILE
# ============================================
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/springlab_db
    username: springlab_user
    password: springlab_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    show-sql: false
    properties:
      hibernate:
        ddl-auto: validate
        format_sql: false
        jdbc:
          batch_size: 50
        generate_statistics: false

  flyway:
    enabled: true
    baseline-on-migrate: false

data:
  initializer:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.jdbc: INFO

# ============================================
# TEST PROFILE
# ============================================
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false